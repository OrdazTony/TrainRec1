services:
  - type: web
    name: trainrec-backend
    env: python
    rootDir: TrainRec1/TrainRec
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn trainrec_exercises:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trainrec-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FLASK_DEBUG
        value: "false"

databases:
  - name: trainrec-db
    databaseName: trainrec
    user: trainrec
